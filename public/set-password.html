<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Archie AI — Set your password</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#f3f5f8; --card:#ffffff; --ink:#0f1b2d; --ink-soft:#5b6b80;
    --line:#e7ecf2; --cyan-grad:linear-gradient(135deg,#37c0fb 0%,#1b9fe6 100%);
    --cyan-deep:#1597dd; --red:#ef4444; --red-soft:#fdeaea;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:grid;place-items:center}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:36px;
    width:100%;max-width:380px;box-shadow:0 8px 40px rgba(16,27,45,.08)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:22px;margin-bottom:8px}
  .mark{width:32px;height:32px;border-radius:9px;background:var(--cyan-grad);display:grid;place-items:center;color:#fff}
  .sub{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:14px 0 6px}
  input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);font-family:inherit;font-size:14px}
  input:focus{outline:2px solid var(--cyan-deep);outline-offset:1px}
  input:disabled{background:#f3f5f8;color:var(--ink-soft)}
  button{width:100%;margin-top:22px;padding:12px;border:none;border-radius:12px;background:var(--cyan-grad);
    color:#fff;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.6;cursor:default}
  .err{margin-top:14px;background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;display:none}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="mark"></span><span id="brandName">Archie AI</span></div>
    <div class="sub" id="subtitle">Set a password to finish creating your account.</div>
    <form id="setPasswordForm" style="display:none">
      <label for="email">Email</label>
      <input id="email" type="email" disabled />
      <label for="password">Choose a password</label>
      <input id="password" type="password" required minlength="8" autocomplete="new-password" />
      <div class="hint">At least 8 characters.</div>
      <label for="confirm">Confirm password</label>
      <input id="confirm" type="password" required minlength="8" autocomplete="new-password" />
      <div id="err" class="err"></div>
      <button id="submitBtn" type="submit">Set password &amp; sign in</button>
    </form>
  </div>

<script>
(async function () {
  const errBox = document.getElementById('err');
  const showErr = (msg) => { errBox.textContent = msg; errBox.style.display = 'block'; };

  const cfgRes = await fetch('/api/config');
  const { supabaseUrl, supabaseAnonKey, brandName } = await cfgRes.json();
  if (brandName) {
    document.title = `${brandName} — Set your password`;
    document.getElementById('brandName').textContent = brandName;
  }
  if (!supabaseUrl || !supabaseAnonKey) {
    document.getElementById('subtitle').textContent = 'Server is not configured yet (missing Supabase env vars).';
    return;
  }
  const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

  // The invite link's URL contains a token that supabase-js parses
  // automatically on load, establishing a real (temporary) session for the
  // invited user -- that's what lets us read their email and later call
  // updateUser({ password }) without asking them to log in first.
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    document.getElementById('subtitle').textContent = 'This invite link is invalid or has expired. Please contact your agency for a new one.';
    return;
  }

  document.getElementById('email').value = session.user.email || '';
  document.getElementById('setPasswordForm').style.display = 'block';

  document.getElementById('setPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('submitBtn');
    errBox.style.display = 'none';

    if (password !== confirm) {
      showErr('Passwords do not match.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Setting password…';

    const { data, error } = await supabase.auth.updateUser({ password });
    if (error) {
      showErr(error.message);
      btn.disabled = false;
      btn.textContent = 'Set password & sign in';
      return;
    }
    // Admin invites and client invites both land here -- route each to the
    // portal that actually matches their account instead of always sending
    // everyone to the client portal.
    const isAdmin = data.user.app_metadata?.role === 'admin';
    window.location.href = isAdmin ? '/admin.html' : '/index.html';
  });
})();
</script>
</body>
</html>
