<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Collision Command Admin — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#1C3A5C; --card:#ffffff; --ink:#16232f; --ink-soft:#5b6b80;
    --line:#dfe3e8; --navy:#1C3A5C;
    --red:#B8272A; --red-soft:#fbe9e9;
  }
  *{box-sizing:border-box;margin:0;padding:0;border-radius:0}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .logo-wrap{margin-bottom:22px}
  .logo-wrap img{max-width:220px;height:auto;display:block}
  .card{background:var(--card);border:1px solid var(--line);padding:36px;
    width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.3)}
  .sub{color:var(--ink-soft);font-size:13px;font-weight:600;margin-bottom:18px}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:14px 0 6px}
  input{width:100%;padding:11px 13px;border:1px solid var(--line);font-family:inherit;font-size:14px}
  input:focus{outline:2px solid var(--navy);outline-offset:1px}
  button{width:100%;margin-top:22px;padding:12px;border:none;background:var(--navy);
    color:#fff;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.6;cursor:default}
  .err{margin-top:14px;background:var(--red-soft);color:var(--red);padding:10px 12px;font-size:13px;font-weight:600;display:none}
</style>
</head>
<body>
  <div class="logo-wrap"><img src="/logo.png" alt="Collision Command" /><span id="brandName" style="display:none">Collision Command</span></div>
  <div class="card">
    <div class="sub">ADMIN PORTAL</div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="current-password" />
      <div id="err" class="err"></div>
      <button id="submitBtn" type="submit">Sign in</button>
    </form>
  </div>

<script>
(async function () {
  const cfgRes = await fetch('/api/config');
  const { supabaseUrl, supabaseAnonKey, brandName } = await cfgRes.json();
  if (brandName) {
    document.title = `${brandName} Admin — Sign in`;
    document.getElementById('brandName').textContent = brandName;
  }
  if (!supabaseUrl || !supabaseAnonKey) {
    document.getElementById('err').textContent = 'Server is not configured yet (missing Supabase env vars).';
    document.getElementById('err').style.display = 'block';
    return;
  }
  const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

  async function goIfAdmin(session, errBox) {
    if (!session) return false;
    if (session.user.app_metadata?.role === 'admin') {
      window.location.href = '/admin.html';
      return true;
    }
    // A real, valid login -- just not an admin account. Sign out rather
    // than leave a non-admin session sitting around on the admin login
    // page.
    await supabase.auth.signOut();
    if (errBox) {
      errBox.textContent = 'This account does not have admin access.';
      errBox.style.display = 'block';
    }
    return false;
  }

  const { data: { session } } = await supabase.auth.getSession();
  await goIfAdmin(session);

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errBox = document.getElementById('err');
    const btn = document.getElementById('submitBtn');
    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      errBox.textContent = error.message;
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }
    const ok = await goIfAdmin(data.session, errBox);
    if (!ok) {
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
})();
</script>
</body>
</html>
