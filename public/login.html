<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Collision Command — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#f3f5f8; --card:#ffffff; --ink:#0f1b2d; --ink-soft:#5b6b80;
    --line:#e7ecf2; --cyan-grad:linear-gradient(135deg,#37c0fb 0%,#1b9fe6 100%);
    --cyan-deep:#1597dd; --red:#ef4444; --red-soft:#fdeaea;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:grid;place-items:center}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:36px;
    width:100%;max-width:360px;box-shadow:0 8px 40px rgba(16,27,45,.08)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:22px;margin-bottom:22px}
  .mark{width:32px;height:32px;border-radius:9px;background:var(--cyan-grad);display:grid;place-items:center;color:#fff}
  label{display:block;font-size:13px;font-weight:700;color:var(--ink-soft);margin:14px 0 6px}
  input{width:100%;padding:11px 13px;border-radius:10px;border:1px solid var(--line);font-family:inherit;font-size:14px}
  input:focus{outline:2px solid var(--cyan-deep);outline-offset:1px}
  button{width:100%;margin-top:22px;padding:12px;border:none;border-radius:12px;background:var(--cyan-grad);
    color:#fff;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.6;cursor:default}
  .err{margin-top:14px;background:var(--red-soft);color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:600;display:none}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="mark"></span><span id="brandName">Collision Command</span></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="email" required autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" required autocomplete="current-password" />
      <div id="err" class="err"></div>
      <button id="submitBtn" type="submit">Sign in</button>
    </form>
  </div>

  <div style="position:fixed;bottom:6px;right:12px;font-size:9.5px;color:var(--ink-soft);opacity:.55">Crafted by <a href="https://autoloopers.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">AutoLoopers</a></div>

<script>
(async function () {
  const cfgRes = await fetch('/api/config');
  const { supabaseUrl, supabaseAnonKey, brandName } = await cfgRes.json();
  if (brandName) {
    document.title = `${brandName} — Sign in`;
    document.getElementById('brandName').textContent = brandName;
  }
  if (!supabaseUrl || !supabaseAnonKey) {
    document.getElementById('err').textContent = 'Server is not configured yet (missing Supabase env vars).';
    document.getElementById('err').style.display = 'block';
    return;
  }
  const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

  // Already signed in? Skip straight to the app.
  const { data: { session } } = await supabase.auth.getSession();
  if (session) window.location.href = '/index.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errBox = document.getElementById('err');
    const btn = document.getElementById('submitBtn');
    errBox.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      errBox.textContent = error.message;
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }
    window.location.href = '/index.html';
  });
})();
</script>
</body>
</html>
